# Experiment 2: Multivariate (multi-source features)
# Input: Multi-source features (calendar, load statistics, time-frequency, lagged load)
# Models: Persistence, MLP, GRU, LSTM, KAN, LSTM-T-KAN, LSTM-MLP, TCN, NBEATS, Transformer, CatBoost, XGBoost
# Horizons: 1-30 days

seed: 42
data:
  raw_data_dir: "data/raw"

# Multi-source features
input_features:
  office:
    - Near_base_load
    - Near_peak_load
    - Approx_max
    - High_load_duration
    - Base_load_duration
    - Hour
    - Is_holiday
    - P_max
    - P_median
    - P_min
    - P_t_1
    - P_t_2
    - P_t_9
    - Peak_to_Peak
    - RMS
    - "Power (kW)" 

models:
  model_types: ["Persistence", "MLP", "GRU", "LSTM", "KAN", "LSTM_T_KAN", "LSTM_MLP", "TCN", "NBEATS", "Transformer", "CatBoost", "XGBoost"]
  MLP:
    hidden_size1: 128
    hidden_size2: 64
    dropout: 0.3

  GRU:
    hidden_size: 64
    num_layers: 2
    dropout: 0.3

  LSTM:
    hidden_size: 64
    num_layers: 2
    dropout: 0.3

  KAN:
    kan_hidden: [128, 64]
    grid_size: 5
    spline_order: 3
    dropout: 0.3

  LSTM_MLP:
    hidden_size: 64
    num_lstm_layers: 1
    mlp_hidden1: 128
    mlp_hidden2: 64
    dropout: 0.3
    bidirectional: false

  TCN:
    num_channels: [64, 64, 64]
    kernel_size: 3
    dropout: 0.3

  LSTM_T_KAN:
    hidden_size: 64
    num_lstm_layers: 1
    dropout: 0.3
    bidirectional: false
    kan_hidden: [128, 64]
    use_layernorm: false
    use_tanh_adapter: true
    kan_tanh_tau: 4.0
    kan_grid_size: 5
    kan_spline_order: 3
    alpha_init: 0.5
    feat_dropout: 0.1

  NBEATS:
    num_blocks: 2
    hidden_size: 32
    num_layers: 2
    dropout: 0.2

  Transformer:
    d_model: 64
    nhead: 4
    num_layers: 2
    dim_feedforward: 128
    dropout: 0.2


  XGBoost:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 2
    min_child_weight: 30
    subsample: 0.5
    colsample_bytree: 0.5
    reg_lambda: 100.0
    reg_alpha: 10.0
    gamma: 5.0
    tree_method: "hist"
    n_jobs: 1

  CatBoost:
    iterations: 500
    learning_rate: 0.05
    depth: 3
    l2_leaf_reg: 50.0
    bagging_temperature: 5.0
    random_strength: 10.0
    rsm: 0.7
    od_wait: 10
    thread_count: 4
    task_type: "CPU"
    seed: 42

training:
  epochs: 100
  batch_size: 64
  window_size: 132
  patience: 10
  learning_rate: 0.0001
  weight_decay: 1e-5
evaluation:
  metrics: ["MAE", "RMSE", "R2", "MAPE", "wMAPE"]
